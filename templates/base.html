<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Gestion des attestations{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        :root {
            --app-primary: #1f5eff;
            --app-ink: #101828;
            --app-muted: #667085;
            --app-line: #e6eaf2;
            --app-soft: #f5f8ff;
            --app-success: #11845b;
            --app-warning: #b76e00;
            --app-danger: #c82e40;
        }

        body {
            min-height: 100vh;
            color: var(--app-ink);
            background:
                radial-gradient(circle at top left, rgba(31, 94, 255, .14), transparent 30rem),
                linear-gradient(135deg, #f8fbff 0%, #eef4ff 48%, #f7f9fc 100%);
        }

        .app-navbar {
            border-bottom: 1px solid rgba(230, 234, 242, .9);
            backdrop-filter: blur(14px);
            background: rgba(255, 255, 255, .88);
        }

        .brand-mark {
            width: 2.4rem;
            height: 2.4rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: .8rem;
            color: #fff;
            background: linear-gradient(135deg, var(--app-primary), #10b981);
            font-weight: 800;
        }

        .app-shell {
            padding-top: 2rem;
            padding-bottom: 2.5rem;
        }

        .surface {
            border: 1px solid rgba(230, 234, 242, .95);
            border-radius: 1.25rem;
            background: rgba(255, 255, 255, .92);
            box-shadow: 0 1.25rem 3.75rem rgba(16, 24, 40, .08);
        }

        .page-kicker {
            color: var(--app-primary);
            font-size: .78rem;
            font-weight: 800;
            letter-spacing: .08em;
            text-transform: uppercase;
        }

        .page-title {
            font-weight: 800;
            letter-spacing: 0;
        }

        .text-muted-app {
            color: var(--app-muted);
        }

        .action-card {
            height: 100%;
            border: 1px solid var(--app-line);
            border-radius: 1rem;
            background: #fff;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .action-card:hover {
            transform: translateY(-3px);
            border-color: rgba(31, 94, 255, .35);
            box-shadow: 0 1rem 2rem rgba(16, 24, 40, .08);
        }

        .action-icon {
            width: 3rem;
            height: 3rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 1rem;
            background: var(--app-soft);
            color: var(--app-primary);
            font-weight: 800;
        }

        .metric-card {
            border: 1px solid var(--app-line);
            border-radius: 1rem;
            background: #fff;
        }

        .metric-value {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
        }

        .table {
            --bs-table-border-color: var(--app-line);
        }

        .table thead th {
            color: #344054;
            background: #f8fafc;
            font-size: .78rem;
            letter-spacing: .04em;
            text-transform: uppercase;
        }

        .form-control,
        .form-select {
            border-color: #d8deea;
            border-radius: .85rem;
            padding: .72rem .9rem;
        }

        .form-control:focus,
        .form-select:focus {
            border-color: rgba(31, 94, 255, .55);
            box-shadow: 0 0 0 .25rem rgba(31, 94, 255, .12);
        }

        .btn {
            border-radius: .85rem;
            font-weight: 700;
        }

        .badge {
            border-radius: 999px;
            padding: .45rem .65rem;
        }

        .empty-state {
            border: 1px dashed #cfd7e6;
            border-radius: 1rem;
            background: #fbfcff;
        }

        .admin-hero {
            overflow: hidden;
            position: relative;
            border-radius: 1.15rem;
            background:
                linear-gradient(135deg, rgba(31, 94, 255, .12), rgba(16, 185, 129, .1)),
                #fff;
        }

        .admin-hero::after {
            content: "";
            position: absolute;
            top: -4rem;
            right: -3rem;
            width: 13rem;
            height: 13rem;
            border-radius: 50%;
            background: rgba(31, 94, 255, .1);
        }

        .admin-visual {
            width: 3rem;
            height: 3rem;
            position: relative;
            border-radius: 1rem;
            background: #f2f6ff;
            flex: 0 0 auto;
        }

        .admin-visual::before,
        .admin-visual::after {
            content: "";
            position: absolute;
            border-radius: 999px;
            background: var(--app-primary);
            opacity: .9;
        }

        .admin-visual::before {
            width: 1.45rem;
            height: .45rem;
            left: .75rem;
            top: .9rem;
        }

        .admin-visual::after {
            width: .45rem;
            height: 1.45rem;
            left: 1.25rem;
            top: .75rem;
        }

        .admin-visual.users::before {
            width: .75rem;
            height: .75rem;
            left: .7rem;
            top: .75rem;
        }

        .admin-visual.users::after {
            width: 1.65rem;
            height: .7rem;
            left: .65rem;
            top: 1.7rem;
        }

        .admin-visual.types::before {
            width: 1.7rem;
            height: .32rem;
            left: .65rem;
            top: .9rem;
            box-shadow: 0 .65rem 0 var(--app-primary);
        }

        .admin-visual.types::after {
            width: .34rem;
            height: .34rem;
            left: .65rem;
            top: 1.82rem;
        }

        .admin-visual.stats::before {
            width: .38rem;
            height: 1.45rem;
            left: .85rem;
            top: 1rem;
            box-shadow: .65rem -.45rem 0 var(--app-primary), 1.3rem -.8rem 0 var(--app-primary);
        }

        .admin-visual.stats::after {
            width: 1.9rem;
            height: .25rem;
            left: .6rem;
            top: 2.45rem;
        }

        .admin-visual.history::before {
            width: 1.55rem;
            height: 1.55rem;
            left: .72rem;
            top: .72rem;
            background: transparent;
            border: .28rem solid var(--app-primary);
        }

        .admin-visual.history::after {
            width: .75rem;
            height: .28rem;
            left: 1.45rem;
            top: 1.45rem;
            transform: rotate(35deg);
            transform-origin: left center;
        }

        .admin-action {
            display: flex;
            flex-direction: column;
            gap: 1rem;
            min-height: 15rem;
        }

        .admin-action .btn {
            align-self: flex-start;
        }

        .agent-panel {
            min-height: 18rem;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--app-line);
            border-radius: 1.15rem;
            background:
                linear-gradient(135deg, rgba(31, 94, 255, .12), rgba(17, 132, 91, .1)),
                #fff;
        }

        .agent-panel::before {
            content: "";
            position: absolute;
            inset: 1.25rem;
            border: 1px solid rgba(31, 94, 255, .12);
            border-radius: 1rem;
        }

        .agent-panel-line {
            height: .75rem;
            border-radius: 999px;
            background: rgba(31, 94, 255, .16);
        }

        .agent-panel-line.short {
            width: 62%;
        }

        .agent-panel-line.medium {
            width: 78%;
        }

        .agent-status-dot {
            width: .8rem;
            height: .8rem;
            display: inline-block;
            border-radius: 50%;
            background: var(--app-success);
            box-shadow: 0 0 0 .35rem rgba(17, 132, 91, .12);
        }

        .auth-shell {
            max-width: 68rem;
            margin-inline: auto;
            overflow: hidden;
        }

        .auth-side {
            height: 100%;
            min-height: 100%;
            border-radius: 1rem;
            background:
                linear-gradient(135deg, rgba(31, 94, 255, .12), rgba(16, 185, 129, .1)),
                #fff;
        }

        .auth-check {
            width: 1.55rem;
            height: 1.55rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: #fff;
            background: var(--app-success);
            font-size: .9rem;
            font-weight: 800;
            flex: 0 0 auto;
        }

        .auth-seal {
            width: 5.25rem;
            height: 5.25rem;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 1.35rem;
            color: #fff;
            background: linear-gradient(135deg, var(--app-primary), #10b981);
            box-shadow: 0 1rem 2rem rgba(31, 94, 255, .2);
            font-size: 1.4rem;
            font-weight: 800;
        }

        .auth-form-wrap {
            max-width: 31rem;
        }
    </style>
</head>

<body>
<nav class="navbar navbar-expand-lg app-navbar sticky-top">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2 fw-bold text-dark" href="{% url 'redirect_by_role' %}">
            <span class="brand-mark">AQ</span>
            <span>AttestaQR</span>
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNav"
                aria-controls="mainNav" aria-expanded="false" aria-label="Afficher la navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="mainNav">
            <div class="ms-auto d-flex flex-column flex-lg-row align-items-lg-center gap-2 mt-3 mt-lg-0">
                {% if request.user.is_authenticated %}
                    <span class="text-muted-app small me-lg-2">
                        {{ request.user.first_name }} {{ request.user.last_name }}
                    </span>

                    <a href="{% url 'redirect_by_role' %}" class="btn btn-outline-primary btn-sm">
                        Mon espace
                    </a>

                    <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                        Déconnexion
                    </a>
                {% else %}
                    <a href="{% url 'login' %}" class="btn btn-outline-primary btn-sm">
                        Connexion
                    </a>

                    <a href="{% url 'register' %}" class="btn btn-primary btn-sm">
                        Inscription
                    </a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>

<main class="container app-shell">
    {% block content %}
    {% endblock %}
</main>

<footer class="container pb-4">
    <div class="d-flex flex-column flex-md-row justify-content-between gap-2 small text-muted-app">
        <span>Gestion des attestations avec vérification QR code</span>
        <span>Plateforme sécurisée AttestaQR</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

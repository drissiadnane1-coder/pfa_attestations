{% extends 'base.html' %}
{% block title %}Mot de passe oublié{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="surface p-4 p-md-5">
            <span class="page-kicker">Récupération</span>
            <h1 class="page-title mt-2 mb-2">Mot de passe oublié ?</h1>
            <p class="text-muted-app mb-4">Entrez votre adresse email. Nous vous enverrons un lien sécurisé pour créer un nouveau mot de passe.</p>

            <form method="POST">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label fw-semibold">Adresse email</label>
                    <input type="email" name="email" class="form-control form-control-lg" required>
                </div>
                <button type="submit" class="btn btn-primary btn-lg w-100 mt-2">Envoyer le lien</button>
                <div class="text-center mt-3">
                    <a href="{% url 'login' %}" class="text-decoration-none">Retour à la connexion</a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% extends 'base.html' %}
{% block title %}Email envoyé{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="surface p-4 p-md-5">
            <div class="mb-4">
                <h1 class="page-title mt-2 mb-2">Vérifiez vos emails</h1>
                <p class="text-muted-app mb-0">Si un compte existe avec cette adresse, un email vous a été envoyé avec les instructions pour réinitialiser votre mot de passe.</p>
            </div>
            <a href="{% url 'login' %}" class="btn btn-outline-primary btn-lg w-100">Retour à l'accueil</a>
        </div>
    </div>
</div>
{% endblock %}

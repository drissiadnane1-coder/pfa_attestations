{% extends 'base.html' %}

{% block title %}Déposer une demande{% endblock %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h2 class="mb-4">Déposer une demande d’attestation</h2>

        {% if message %}
            <div class="alert alert-success">{{ message }}</div>
        {% endif %}

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
                <label class="form-label">Type d’attestation</label>
                <select name="type_attestation" class="form-select" required>
                    <option value="">-- Choisir un type --</option>
                    {% for type in types %}
                        <option value="{{ type.id }}">{{ type.libelle }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Commentaire</label>
                <textarea name="commentaire" rows="4" class="form-control"></textarea>
            </div>

            <button type="submit" class="btn btn-primary">
                Envoyer la demande
            </button>

            <a href="{% url 'demandeur_dashboard' %}" class="btn btn-secondary">
                Retour
            </a>
        </form>

    </div>
</div>

{% endblock %}

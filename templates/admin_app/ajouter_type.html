<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter type</title>
</head>
<body>

    <h1>Ajouter un type d’attestation</h1>

    <form method="POST">
        {% csrf_token %}

        <label>Libellé :</label><br>
        <input type="text" name="libelle" required>

        <br><br>

        <label>Description :</label><br>
        <textarea name="description" rows="5" cols="50"></textarea>

        <br><br>

        <button type="submit">Enregistrer</button>
    </form>

    <br>

    <a href="{% url 'liste_types_attestation' %}">Retour</a>

</body>
</html>

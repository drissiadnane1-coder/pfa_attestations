{% extends 'base.html' %}

{% block title %}Ajouter type{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="surface p-4 p-md-5">
            <div class="mb-4">
                <span class="page-kicker">Catalogue</span>
                <h1 class="page-title mt-2 mb-2">Ajouter un type d’attestation</h1>
                <p class="text-muted-app mb-0">Créez un type actif qui pourra être choisi par les demandeurs.</p>
            </div>

            <form method="POST" class="vstack gap-3">
                {% csrf_token %}

                <div>
                    <label class="form-label fw-semibold">Libellé</label>
                    <input type="text" name="libelle" class="form-control form-control-lg" required>
                </div>

                <div>
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" rows="5" class="form-control"></textarea>
                </div>

                <div class="d-flex flex-column flex-sm-row gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">
                        Enregistrer
                    </button>
                    <a href="{% url 'liste_types_attestation' %}" class="btn btn-outline-secondary btn-lg">
                        Retour
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

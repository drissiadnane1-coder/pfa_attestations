{% extends 'base.html' %}

{% block title %}Modifier type{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="surface p-4 p-md-5">
            <div class="mb-4">
                <span class="page-kicker">Catalogue</span>
                <h1 class="page-title mt-2 mb-2">Modifier le type d’attestation</h1>
                <p class="text-muted-app mb-0">Mettez à jour le libellé et la description visibles dans les demandes.</p>
            </div>

            <form method="POST" class="vstack gap-3">
                {% csrf_token %}

                <div>
                    <label class="form-label fw-semibold">Libellé</label>
                    <input type="text" name="libelle" value="{{ type_attestation.libelle }}"
                           class="form-control form-control-lg" required>
                </div>

                <div>
                    <label class="form-label fw-semibold">Description</label>
                    <textarea name="description" rows="5" class="form-control">{{ type_attestation.description }}</textarea>
                </div>

                <div class="d-flex flex-column flex-sm-row gap-2">
                    <button type="submit" class="btn btn-warning btn-lg">
                        Modifier
                    </button>
                    <a href="{% url 'liste_types_attestation' %}" class="btn btn-outline-secondary btn-lg">
                        Retour
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

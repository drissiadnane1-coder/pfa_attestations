{% extends 'base.html' %}

{% block title %}Espace Demandeur{% endblock %}

{% block content %}

<div class="card shadow">
    <div class="card-body">

        <h2 class="mb-4">
            Espace Demandeur
        </h2>

        <p class="text-muted">
            Bienvenue {{ request.user.first_name }} {{ request.user.last_name }}
        </p>

        <div class="d-grid gap-3 mt-4">

            <a href="{% url 'deposer_demande' %}"
               class="btn btn-primary btn-lg">
                Déposer une demande d’attestation
            </a>

            <a href="{% url 'mes_demandes' %}"
               class="btn btn-outline-primary btn-lg">
                Consulter mes demandes et télécharger mes attestations
            </a>

        </div>

    </div>
</div>

{% endblock %}
